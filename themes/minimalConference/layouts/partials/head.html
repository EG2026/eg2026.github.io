<head>
    <meta charset="utf-8"> {{ $title := print .Site.Title " | " .Title }} {{ if .IsHome }}{{ $title = .Site.Title }}{{ end }}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="{{ "images/favicon.png" | relURL }}">
    <meta name="author" content="Jan Möbius, Alexandra Heuschling, Yanjiang He"/>
    <meta property="og:image" content="{{ .Site.BaseURL }}images/twitter-card.jpg"></meta>
    <meta property="og:description" content="{{ .Site.Params.about }}" /> 
    <meta name="twitter:card" content="summary_large_image"></meta> 
    <meta name="og:title" content="{{$title}}"></meta>
    <link rel="stylesheet" type="text/css" href="/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/css/style.css">
    <title>{{ $title }}</title>
</head>
